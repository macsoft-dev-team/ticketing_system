paths:
  /user:
    get:
      summary: Get user details
      description: Retrieve details of the authenticated user.
      tags:
        - User
      security:
        - bearerAuth: []
      responses:
        200:
          description: Successfully retrieved user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: 12345
                  name:
                    type: string
                    example: John Doe
                  email:
                    type: string
                    example: john.doe@example.com
        401:
          description: Unauthorized
        500:
          description: Internal server error

    post:
      summary: Create a new user
      description: Add a new user to the system.
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  example: jane.doe@example.com
                password:
                  type: string
                  example: password123
      responses:
        201:
          description: User successfully created
        400:
          description: Bad request
        500:
          description: Internal server error

    put:
      summary: Update user details
      description: Modify details of an existing user.
      tags:
        - User
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Smith
                email:
                  type: string
                  example: john.smith@example.com
      responses:
        200:
          description: User details successfully updated
        400:
          description: Bad request
        401:
          description: Unauthorized
        500:
          description: Internal server error