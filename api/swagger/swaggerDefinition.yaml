openapi: 3.0.0
info:
  title: Ticket Management API
  version: 1.0.0
  description: API documentation for managing tickets, users, and notifications

servers:
  - url: http://localhost:8080/api
    description: Local server

tags:
  - name: Tickets
    description: Ticket operations
  - name: Users
    description: User operations

paths:
  /register:
    post:
      summary: Register a new user
      description: Create a new user account.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                phone:
                  type: string
                  example: 9876543210
                password:
                  type: string
                  example: password123
      responses:
        201:
          description: User successfully registered
        400:
          description: Bad request
        500:
          description: Internal server error

  /login:
    post:
      summary: User login
      description: Authenticate a user and return a token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: password123
      responses:
        200:
          description: Successfully authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        401:
          description: Invalid credentials
        500:
          description: Internal server error

  /user:
    get:
      summary: Get user details
      description: Retrieve details of the authenticated user.
      tags:
        - User
      security:
        - bearerAuth: []
      responses:
        200:
          description: Successfully retrieved user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: 12345
                  name:
                    type: string
                    example: John Doe
                  email:
                    type: string
                    example: john.doe@example.com
        401:
          description: Unauthorized
        500:
          description: Internal server error

    post:
      summary: Create a new user
      description: Add a new user to the system.
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  example: jane.doe@example.com
                password:
                  type: string
                  example: password123
      responses:
        201:
          description: User successfully created
        400:
          description: Bad request
        500:
          description: Internal server error

    put:
      summary: Update user details
      description: Modify details of an existing user.
      tags:
        - User
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Smith
                email:
                  type: string
                  example: john.smith@example.com
      responses:
        200:
          description: User details successfully updated
        400:
          description: Bad request
        401:
          description: Unauthorized
        500:
          description: Internal server error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
